    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const lang = (navigator.language || navigator.userLanguage || 'en').split('-')[0].toLowerCase();
        const supportedLangs = ['en','es','fr','de','pt','zh','ja','ko','ar','ru','hi','it','nl','tr','pl','sv','no','da','fi','el','he','th','vi','id','ms','tl','uk','cs','ro','hu','bg','hr','sk','sl','sr','lt','lv','et','ca','gl','eu','af','sq','am','az','be','bn','bs','ceb','ny','co','eo','fy','ka','gu','ht','ha','haw','iw','hmn','ig','ga','jw','kn','kk','km','rw','ku','ky','lo','la','lb','mk','mg','ml','mt','mi','mr','mn','my','ne','or','ps','fa','sm','gd','st','sn','sd','si','so','su','sw','tg','ta','tt','te','tk','ur','ug','uz','cy','xh','yi','yo','zu'];
        const preferred = localStorage.getItem('preferred-lang');
        const targetLang = preferred || (supportedLangs.includes(lang) && lang !== 'en' ? lang : null);
        if (targetLang) {
            const checkTranslate = setInterval(() => {
                const select = document.querySelector('.goog-te-combo');
                if (select) {
                    select.value = targetLang;
                    select.dispatchEvent(new Event('change'));
                    clearInterval(checkTranslate);
                }
            }, 500);
            setTimeout(() => clearInterval(checkTranslate), 10000);
        }
    });
    </script>
