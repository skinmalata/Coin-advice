    <style>
        .arbitrage-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .arbitrage-controls select,
        .arbitrage-controls input[type="text"],
        .arbitrage-controls input[type="number"] {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-weight: 500;
            min-width: 150px;
        }
        .arbitrage-controls select:focus,
        .arbitrage-controls input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
        }
        .arbitrage-controls .btn {
            padding: 0.75rem 1.5rem;
            font-weight: 600;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }
        .control-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .arbitrage-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .arb-btn:hover {
            filter: brightness(1.2);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(124,58,237,0.2);
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .empty-state {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3rem;
        }
        @media (max-width: 768px) {
            .arbitrage-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .exchange-row {
                grid-template-columns: 1fr !important;
            }
            .exchange-row > div {
                text-align: center;
            }
        }
    </style>
</head>

    <main class="container">
        <div class="hero-section">
            <h1>⚡ Arbitrage Scanner</h1>
            <p class="hero-subtitle">Find price discrepancies across exchanges and calculate real profit after fees</p>
        </div>

        <div class="arbitrage-controls">
            <div class="control-group">
                <label for="arbitrage-coin">Coin</label>
                <select id="arbitrage-coin">
                    <option value="btc">Bitcoin (BTC)</option>
                    <option value="eth">Ethereum (ETH)</option>
                    <option value="sol">Solana (SOL)</option>
                    <option value="bnb">BNB</option>
                    <option value="xrp">XRP</option>
                    <option value="doge">Dogecoin (DOGE)</option>
                    <option value="ada">Cardano (ADA)</option>
                    <option value="avax">Avalanche (AVAX)</option>
                    <option value="link">Chainlink (LINK)</option>
                    <option value="dot">Polkadot (DOT)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="arbitrage-fee">Fee Rate (%)</label>
                <input type="number" id="arbitrage-fee" value="0.1" min="0" max="2" step="0.05" aria-label="Trading fee percentage">
            </div>

            <div class="control-group">
                <label for="arbitrage-sort">Sort By</label>
                <select id="arbitrage-sort">
                    <option value="profit">Highest Net Profit</option>
                    <option value="spread">Highest Spread ($)</option>
                </select>
            </div>

            <div class="control-group" style="flex: 1; min-width: 200px;">
                <label for="arbitrage-search">Search</label>
                <input type="text" id="arbitrage-search" placeholder="Filter by exchange...">
            </div>

            <div class="control-group">
                <label>&nbsp;</label>
                <button id="scan-arbitrage" class="btn btn-primary">🔍 Scan Now</button>
            </div>
        </div>

        <div id="tool-content" class="crypto-grid"></div>
