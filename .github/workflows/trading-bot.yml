name: Trading Bot
on:
  schedule:
    - cron: '* * * * *'  # Every minute
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements.txt
      - run: python trading-bot/run_bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          USER_TELEGRAM_ID: ${{ secrets.USER_TELEGRAM_ID }}
